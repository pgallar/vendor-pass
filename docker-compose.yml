# Levanta todo con: docker compose up
# App → http://localhost:3000  |  API REST (Supabase-compatible) → http://localhost:54321
#
# Si tienes `npx supabase start` corriendo, deténlo primero (usa el mismo puerto 54321):
#   npx supabase stop

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./docker/postgres/00-roles.sql:/docker-entrypoint-initdb.d/00-roles.sql:ro
      - ./docker/postgres/05-auth-stubs.sql:/docker-entrypoint-initdb.d/05-auth-stubs.sql:ro
      - ./supabase/migrations/0001_init.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
      - ./supabase/migrations/0002_document_file_hash.sql:/docker-entrypoint-initdb.d/12-file-hash.sql:ro
      - ./supabase/migrations/0003_auth_user_ownership.sql:/docker-entrypoint-initdb.d/13-auth.sql:ro
      - ./supabase/migrations/0004_email_notifications.sql:/docker-entrypoint-initdb.d/15-email-notifications.sql:ro
      - ./supabase/migrations/0005_profiles.sql:/docker-entrypoint-initdb.d/16-profiles.sql:ro
      - ./supabase/migrations/0006_api_keys.sql:/docker-entrypoint-initdb.d/17-api-keys.sql:ro
      - ./docker/postgres/11-grants.sql:/docker-entrypoint-initdb.d/14-grants.sql:ro
      - ./supabase/seed.sql:/docker-entrypoint-initdb.d/20-seed.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 2s
      timeout: 5s
      retries: 15

  postgrest:
    image: postgrest/postgrest:v12.2.8
    environment:
      PGRST_DB_URI: postgres://authenticator:postgres@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      PGRST_DB_EXTRA_SEARCH_PATH: public
    depends_on:
      db:
        condition: service_healthy

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '8025:8025'
      - '1025:1025'
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: '1'
      MP_SMTP_AUTH_ALLOW_INSECURE: '1'

  email-templates:
    image: caddy:2-alpine
    command: ['caddy', 'file-server', '-r', '/templates', '--listen', ':80']
    volumes:
      - ./docker/email-templates:/templates:ro

  auth:
    image: supabase/gotrue:v2.186.0
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: http://localhost:54321
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:postgres@db:5432/postgres?sslmode=disable&options=-csearch_path=auth
      GOTRUE_SITE_URL: http://localhost:3000/auth/callback
      GOTRUE_URI_ALLOW_LIST: http://localhost:3000,http://localhost:3000/**,http://localhost:3000/auth/callback,http://localhost:3000/auth/callback?next=/reset-password
      GOTRUE_DISABLE_SIGNUP: 'false'
      GOTRUE_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_ISSUER: supabase-demo
      GOTRUE_EXTERNAL_EMAIL_ENABLED: 'true'
      GOTRUE_MAILER_AUTOCONFIRM: 'false'
      GOTRUE_SMTP_HOST: mailpit
      GOTRUE_SMTP_PORT: '1025'
      GOTRUE_SMTP_ADMIN_EMAIL: noreply@vendorpass.local
      GOTRUE_SMTP_SENDER_NAME: VendorPass
      GOTRUE_MAILER_TEMPLATES_CONFIRMATION: http://email-templates/confirmation.html
      GOTRUE_MAILER_TEMPLATES_RECOVERY: http://email-templates/recovery.html
      GOTRUE_MAILER_SUBJECTS_CONFIRMATION: 'VendorPass: Confirma tu cuenta'
      GOTRUE_MAILER_SUBJECTS_RECOVERY: 'VendorPass: Restablece tu contraseña'
      GOTRUE_RATE_LIMIT_EMAIL_SENT: 300
      GOTRUE_DB_AUTOMIGRATE: 'true'
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
      email-templates:
        condition: service_started

  gateway:
    image: nginx:alpine
    ports:
      - '54321:80'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - postgrest
      - auth

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - '9010:9000'
      - '9011:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: vendor-pass-evidence
    volumes:
      - ./docker/minio-init.sh:/minio-init.sh:ro
    entrypoint: ['/bin/sh', '/minio-init.sh']

  app:
    image: node:20-bookworm-slim
    working_dir: /app
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    env_file:
      - .env.docker
    environment:
      WATCHPACK_POLLING: 'true'
      CHOKIDAR_USEPOLLING: 'true'
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: http://localhost:9010
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: vendor-pass-evidence
      S3_REGION: us-east-1
      SMTP_HOST: mailpit
      SMTP_PORT: '1025'
      SMTP_FROM: noreply@vendorpass.local
      SMTP_FROM_NAME: VendorPass
      EMAIL_NOTIFICATIONS_ENABLED: 'true'
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      AI_EXTRACTION_MODEL: ${AI_EXTRACTION_MODEL:-google/gemini-2.0-flash-001}
    command: ['sh', '/app/docker/entrypoint-app.sh']
    depends_on:
      gateway:
        condition: service_started
      auth:
        condition: service_started
      mailpit:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  arkiv-cron:
    image: node:20-bookworm-slim
    working_dir: /app
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    env_file:
      - .env.docker
    environment:
      # 05:00 UTC diario — ver README para cambiar zona horaria
      ARKIV_SYNC_CRON: '0 5 * * *'
      ARKIV_SYNC_ON_START: 'false'
      SMTP_HOST: mailpit
      SMTP_PORT: '1025'
      SMTP_FROM: noreply@vendorpass.local
      SMTP_FROM_NAME: VendorPass
      EMAIL_NOTIFICATIONS_ENABLED: 'true'
    command: ['sh', '/app/docker/entrypoint-arkiv-cron.sh']
    depends_on:
      gateway:
        condition: service_started
      mailpit:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  dbdata:
  miniodata:
  app_node_modules:
