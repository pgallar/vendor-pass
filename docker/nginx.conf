server {
  listen 80;
  server_name _;

  # Compatible con @supabase/supabase-js (espera /rest/v1/...)
  location /rest/v1/ {
    proxy_pass http://postgrest:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  # GoTrue API + CORS para el navegador (localhost:3000 → :54321)
  location /auth/v1/ {
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Expose-Headers;
    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin http://localhost:3000;
      add_header Access-Control-Allow-Credentials true;
      add_header Access-Control-Allow-Headers "authorization,apikey,content-type,x-client-info,x-supabase-api-version";
      add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
      return 204;
    }
    add_header Access-Control-Allow-Origin http://localhost:3000 always;
    add_header Access-Control-Allow-Credentials true always;
    proxy_pass http://auth:9999/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /verify {
    add_header Access-Control-Allow-Origin http://localhost:3000 always;
    add_header Access-Control-Allow-Credentials true always;
    proxy_pass http://auth:9999/verify;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /recover {
    add_header Access-Control-Allow-Origin http://localhost:3000 always;
    add_header Access-Control-Allow-Credentials true always;
    proxy_pass http://auth:9999/recover;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
